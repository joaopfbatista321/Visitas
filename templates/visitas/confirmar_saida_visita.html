{% extends "layouts/base.html" %}

{% block content %}
<div class="pc-container">
  <div class="pc-content">

    <h2 class="mb-3">Registar saída de visita</h2>

    <div class="card">
      <div class="card-body">
        <p>
          Confirmar saída da visita de <strong>{{ visita.nome_visitante }}</strong>
          ao utente <strong>{{ visita.utente.nome }}</strong>?
        </p>
        <p>
          Entrada em {{ visita.data_hora_entrada|date:"d/m/Y H:i" }}.
        </p>

        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Confirmar saída agora</button>
          <a href="{% url 'visitas:detalhe_utente' visita.utente.pk %}" class="btn btn-secondary">Cancelar</a>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
